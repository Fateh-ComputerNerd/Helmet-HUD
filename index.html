<!DOCTYPE html>
<html>
<head>
    <title>Iron Man VR HUD - 60FPS SBS Object Detection</title>
    <style>
        * { margin: 0; padding: 0; overflow: hidden; }
        body { background: #000; font-family: 'Courier New'; }

        #vr-container {
            position: relative;
            width: 100vw; height: 100vh;
        }

        #canvas {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
        }

        .hud {
            position: absolute; color: #00FF00; font-size: 22px;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px;
            z-index: 100;
        }

        #status { top: 20px; left: 20px; width: 45vw; }
        #fps { top: 20px; right: 20px; width: 45vw; }
    </style>
</head>
<body>
    <div id="vr-container">
        <video id="video" autoplay muted playsinline style="display:none;"></video>
        <canvas id="canvas"></canvas>
        <div id="status" class="hud">LOADING AI MODEL...</div>
        <div id="fps" class="hud">FPS: --</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@latest"></script>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const fpsEl = document.getElementById('fps');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let model;
        let lastTime = 0;
        let frameCount = 0;
        let detectEnabled = false;

        async function loadModel() {
            status.textContent = 'LOADING COCO-SSD...';
            model = await cocoSsd.load();
            status.textContent = '🎯 AI ONLINE - 60FPS VR';
            detectEnabled = true;
            requestAnimationFrame(detectLoop);
        }

        navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                width: {ideal: 1920, max: 3840},
                height: {ideal: 1080, max: 2160}
            }
        }).then(stream => {
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                loadModel();
            };
        }).catch(err => {
            status.textContent = 'CAMERA ERROR - Using front cam';
            navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                video.onloadedmetadata = () => video.play();
            });
        });

        function detectLoop(currentTime = 0) {
            const frameTime = currentTime - lastTime;
            frameCount++;

            if (frameTime >= 16.67) {
                if (frameCount >= 60) {
                    fpsEl.textContent = `FPS: ${Math.round(1000/frameTime)}`;
                    frameCount = 0;
                }
                lastTime = currentTime;

                if (detectEnabled && model && video.readyState === 4) {
                    detectObjects();
                }
            }
            requestAnimationFrame(detectLoop);
        }

        async function detectObjects() {
            try {
                const predictions = await model.detect(video);

                ctx.save();
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // SBS rendering: split canvas into two halves
                const halfWidth = canvas.width / 2;

                ctx.drawImage(video, 0, 0, halfWidth, canvas.height);           // LEFT eye
                ctx.drawImage(video, halfWidth, 0, halfWidth, canvas.height);   // RIGHT eye

                predictions.forEach(prediction => {
                    if (prediction.score > 0.4) {
                        const [x, y, width, height] = prediction.bbox;
                        const confidence = Math.round(prediction.score * 100);

                        ctx.strokeStyle = '#00FFFF';
                        ctx.lineWidth = 5;
                        ctx.font = 'bold 26px Courier New';
                        ctx.fillStyle = '#00FFFF';
                        ctx.textAlign = 'left';

                        // LEFT eye
                        ctx.strokeRect(x, y, width, height);
                        ctx.fillText(`${prediction.class} ${confidence}%`, x, y - 8);

                        // RIGHT eye (shifted by halfWidth)
                        ctx.strokeRect(halfWidth + x, y, width, height);
                        ctx.fillText(`${prediction.class} ${confidence}%`, halfWidth + x, y - 8);
                    }
                });

                ctx.restore();
            } catch(e) {}
        }

        document.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        screen.orientation?.addEventListener('change', () => {
            if (screen.orientation.type.includes('landscape')) {
                setTimeout(() => document.documentElement.requestFullscreen(), 500);
            }
        });
    </script>
</body>
</html>
