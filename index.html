<!DOCTYPE html>
<html>
<head>
    <title>Iron Man VR - Fixed Zoom/SBS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        * { margin: 0; padding: 0; overflow: hidden; }
        body { background: black; font-family: 'Courier New'; }
        #video { 
            width: 100vw !important; 
            height: 100vh !important; 
            object-fit: contain !important; /* FIXED ZOOM */
            object-position: center;
        }
        .vr-sbs {
            position: absolute; width: 200vw; height: 100vh; top: 0; left: 0;
        }
        .hud { 
            position: absolute; color: #00FF00; font-size: 20px; 
            background: rgba(0,255,0,0.3); padding: 8px; border-radius: 5px; 
            top: 10px; left: 10px; width: 48vw; z-index: 100;
        }
        .hud-right { left: 50vw; }
        .detection { 
            position: absolute; border: 2px solid #00FF00; 
            background: rgba(0,255,0,0.3); font-size: 16px; padding: 2px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="vr-sbs">
        <video id="video" autoplay muted playsinline></video>
        <div class="hud">🔄 Starting...</div>
        <div class="hud hud-right">👁️ VR SBS</div>
    </div>
    
    <script>
        let model;
        const video = document.getElementById('video');
        
        // Start camera NORMAL view
        navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: 'environment',
                width: { ideal: 1920, max: 1920 },
                height: { ideal: 1080, max: 1080 }
            } 
        }).then(stream => {
            video.srcObject = stream;
            video.onloadeddata = () => {
                loadAI();
            };
        }).catch(() => {
            // Fallback
            navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                video.onloadeddata = loadAI;
            });
        });
        
        async function loadAI() {
            try {
                document.querySelector('.hud').textContent = '🟢 AI Loading...';
                model = await cocoSsd.load();
                document.querySelector('.hud').textContent = '🎯 AI ONLINE';
                document.querySelector('.hud-right').textContent = '👁️ SBS ACTIVE';
                detectLoop();
            } catch(e) {
                document.querySelector('.hud').textContent = '🟢 HUD READY';
            }
        }
        
        async function detectLoop() {
            if (model && video.readyState === 4) {
                const predictions = await model.detect(video);
                showDetections(predictions);
            }
            requestAnimationFrame(detectLoop);
        }
        
        function showDetections(predictions) {
            document.querySelectorAll('.detection').forEach(d => d.remove());
            
            predictions.slice(0, 3).forEach(pred => {
                if (pred.score > 0.5) {
                    const x = pred.bbox[0] * 100 / video.videoWidth;
                    const y = pred.bbox[1] * 100 / video.videoHeight;
                    const w = pred.bbox[2] * 100 / video.videoWidth;
                    const h = pred.bbox[3] * 100 / video.videoHeight;
                    
                    const box = document.createElement('div');
                    box.className = 'detection';
                    box.style.left = x + '%';
                    box.style.top = y + '%';
                    box.style.width = w + '%';
                    box.style.height = h + '%';
                    box.textContent = `${pred.class} ${(pred.score*100).toFixed(0)}%`;
                    document.body.appendChild(box);
                }
            });
        }
    </script>
</body>
</html>
