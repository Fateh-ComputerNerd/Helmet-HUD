<!DOCTYPE html>
<html>
<head>
    <title>Iron Man Live Object Detection VR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        * { margin: 0; padding: 0; overflow: hidden; }
        body { background: black; font-family: 'Courier New'; }
        #video { 
            width: 200vw; height: 100vh; 
            object-fit: cover; 
            transform: scaleX(2); /* DOUBLE WIDTH FOR SBS */
        }
        .hud { 
            position: absolute; color: #00FF00; font-size: 24px; 
            background: rgba(0,255,0,0.3); padding: 10px; border-radius: 5px; 
            top: 20px; left: 20px; width: 45vw; 
        }
        .hud-right { left: 52vw; }
        .detection { 
            position: absolute; border: 3px solid #00FF00; 
            background: rgba(0,255,0,0.4); font-size: 18px; padding: 3px; 
            transform: scaleX(2); /* Boxes also SBS */
        }
    </style>
</head>
<body>
    <video id="video" autoplay muted playsinline></video>
    <div class="hud">🟢 LOADING AI...</div>
    <div class="hud hud-right">🔄 INITIALIZING...</div>
    
    <script>
        let model;
        let video = document.getElementById('video');
        
        async function init() {
            model = await cocoSsd.load();
            document.querySelector('.hud').innerHTML = '🟢 AI ONLINE';
            document.querySelector('.hud-right').innerHTML = '📡 LIVE TRACKING';
            detectFrame();
        }
        
        async function detectFrame() {
            if (model && video.videoWidth > 0) {
                const predictions = await model.detect(video);
                displayDetections(predictions);
            }
            requestAnimationFrame(detectFrame);
        }
        
        function displayDetections(predictions) {
            document.querySelectorAll('.detection').forEach(el => el.remove());
            
            predictions.slice(0,5).forEach(pred => { // Top 5 detections
                const score = (pred.score * 100).toFixed(0);
                if (score > 60) {
                    const x = (pred.bbox[0] / video.videoWidth) * 100;
                    const y = (pred.bbox[1] / video.videoHeight) * 100;
                    const w = (pred.bbox[2] / video.videoWidth) * 100;
                    const h = (pred.bbox[3] / video.videoHeight) * 100;
                    
                    const box = document.createElement('div');
                    box.className = 'detection';
                    box.style.left = x + '%';
                    box.style.top = y + '%';
                    box.style.width = w + '%';
                    box.style.height = h + '%';
                    box.innerHTML = `${pred.class}<br>${score}%`;
                    document.body.appendChild(box);
                }
            });
            
            if (predictions.length > 0) {
                const top = predictions[0];
                document.querySelector('.hud').innerHTML = 
                    `🎯 ${top.class.toUpperCase()}<br>${(top.score*100).toFixed(0)}% LOCKED`;
            }
        }
        
        navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment', width: 1280, height: 720}})
            .then(stream => {
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    setTimeout(init, 1000);
                };
            }).catch(e => {
                document.body.innerHTML = '<div style="color:#ff4444;font-size:32px;padding:50px;text-align:center">ALLOW CAMERA PERMISSION FOR VR HUD</div>';
            });
    </script>
</body>
</html>
