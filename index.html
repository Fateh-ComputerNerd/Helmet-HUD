<!DOCTYPE html>
<html>
<head>
    <title>Iron Man Live Object Detection VR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        * { margin: 0; padding: 0; overflow: hidden; }
        body { background: black; font-family: 'Courier New'; }
        #video { width: 200vw; height: 100vh; object-fit: cover; }
        .hud { position: absolute; color: #00FF00; font-size: 24px; background: rgba(0,255,0,0.2); padding: 10px; border-radius: 5px; top: 20px; left: 20px; width: 45vw; }
        .hud-right { left: 55vw; }
        .detection { position: absolute; border: 3px solid #00FF00; background: rgba(0,255,0,0.3); font-size: 20px; padding: 5px; }
    </style>
</head>
<body>
    <video id="video" autoplay muted playsinline></video>
    
    <script>
        let model;
        let video = document.getElementById('video');
        
        async function init() {
            model = await cocoSsd.load();
            console.log('Iron Man AI loaded!');
            detectFrame();
        }
        
        async function detectFrame() {
            if (model && video.videoWidth > 0) {
                const predictions = await model.detect(video);
                displayDetections(predictions);
            }
            requestAnimationFrame(detectFrame);
        }
        
        function displayDetections(predictions) {
            // Clear previous boxes
            document.querySelectorAll('.detection').forEach(el => el.remove());
            
            predictions.forEach(pred => {
                const score = (pred.score * 100).toFixed(0);
                if (score > 50) { // Only show confident detections
                    const x = (pred.bbox[0] / video.videoWidth) * 100;
                    const y = (pred.bbox[1] / video.videoHeight) * 100;
                    const w = (pred.bbox[2] / video.videoWidth) * 100;
                    const h = (pred.bbox[3] / video.videoHeight) * 100;
                    
                    const box = document.createElement('div');
                    box.className = 'detection';
                    box.style.left = x + '%';
                    box.style.top = y + '%';
                    box.style.width = w + '%';
                    box.style.height = h + '%';
                    box.innerHTML = `${pred.class} ${score}%`;
                    document.body.appendChild(box);
                }
            });
            
            // Update HUD with top detection
            if (predictions.length > 0) {
                const top = predictions[0];
                document.querySelector('.hud').innerHTML = 
                    `🟢 AI ONLINE<br>🎯 ${top.class} ${(top.score*100).toFixed(0)}%<br>🔒 TARGET LOCKED`;
            }
        }
        
        navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}})
            .then(stream => {
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    init();
                };
            });
    </script>
</body>
</html>
